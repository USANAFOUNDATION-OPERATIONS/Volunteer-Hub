<!DOCTYPE html>
<html>
<head>
<style>
body { background: #fffbf2; }
.app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.goal-banner { background: #fef3c7; padding: 10px 20px; font-size: 18px; }
.main-layout { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 200px; background: white; border-right: 1px solid #ddd; }
.content { flex: 1; overflow-y: auto; padding: 20px; }
.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="goal-banner">No child should ever go hungry</div>
  <div class="main-layout">
    <nav class="sidebar"><p>Sidebar</p></nav>
    <main class="content">
      <div class="page active" id="page-dashboard">
        <h1>Dashboard</h1>
        <p>This is the dashboard content.</p>
      </div>
    </main>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var h = document.createElement('div');
  h.style.cssText = 'position:fixed;top:10px;right:10px;background:green;color:white;padding:10px;z-index:9999;';
  h.textContent = 'JS OK';
  document.body.appendChild(h);
});
</script>
</body>
</html>
